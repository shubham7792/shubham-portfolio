{% extends 'base.html' %}
{% load static %}
{% load account %}

{% block title %}Logout — Portfolio{% endblock %}

{% block content %}
<section class="auth-section">
  <div class="auth-container">
    <div class="auth-card" style="text-align:center;">
      <i class="fas fa-sign-out-alt" style="font-size:2.5rem; color:var(--text-muted); display:block; margin-bottom:1rem;"></i>
      <h2 style="margin-bottom:0.75rem;">Sign Out</h2>
      <p style="color:var(--text-muted); margin-bottom:1.5rem;">Are you sure you want to sign out?</p>
      <form method="POST">
        {% csrf_token %}
        <div style="display:flex; gap:1rem; justify-content:center;">
          <button type="submit" class="btn btn-primary">
            <i class="fas fa-sign-out-alt"></i> Yes, Sign Out
          </button>
          <a href="/" class="btn btn-outline">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</section>
{% endblock %}
